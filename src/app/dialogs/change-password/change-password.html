<!--
  DIALOG "RECUPERO PASSWORD" — aperto da Login al click di "Forgot Password?".
  L'utente inserisce il proprio username; il backend invia un'email con il link di reset.

  Questo dialog NON usa Material Dialog layout (niente mat-dialog-content/actions).
  Usa stili CSS inline diretti — funziona ugualmente, è solo una scelta stilistica.

  [(ngModel)]="userName": two-way binding su un campo semplice (non un Reactive Form).
  Ogni carattere digitato aggiorna direttamente la proprietà userName in change-password.ts.

  inviaRichiesta(): chiama authService.requestPasswordReset(userName).
  msg: stringa di feedback mostrata dopo la chiamata (es. "Email sent!" o messaggio errore).
  close(): chiude il dialog senza restituire dati.
-->
<div style="padding: 20px; text-align: center;">
  <h2>Password Recovery</h2>
  <p>Enter your username to receive a recovery email.</p>

  <!-- [(ngModel)]: aggiorna userName in tempo reale mentre l'utente digita -->
  <input type="text" [(ngModel)]="userName" placeholder="Username"
    style="padding: 10px; width: 80%; margin-bottom: 15px;">
  <br>

  <button (click)="inviaRichiesta()" style="padding: 10px 20px; cursor: pointer; margin-right: 10px;">Send Email</button>
  <button (click)="close()" style="padding: 10px 20px; cursor: pointer;">Close</button>

  <!-- Messaggio di feedback: vuoto finché inviaRichiesta() non risponde -->
  <p style="color: rgb(55, 0, 255); font-weight: bold; margin-top: 15px;">{{msg}}</p>
</div>

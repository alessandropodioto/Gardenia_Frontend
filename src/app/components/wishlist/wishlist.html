<div class="cart-page-container">
  <div class="cart-header">
    <h2>Wishlist</h2>
  </div>

  <div class="cart-items" *ngIf="wishlistService.items().length > 0">
    <div class="cart-item" *ngFor="let item of wishlistService.items()">
      
      <a [routerLink]="['/product', item.productId]" class="img-link">
        <img [src]="formatImg(item.immagine)" [alt]="item.productName" class="product-img" />
      </a>

      <div class="item-details">
        <a [routerLink]="['/product', item.productId]" class="title-link">
          <h4>{{ item.productName }}</h4>
        </a>
        <div class="status-wrapper">
          <span class="stock-status">In Stock - Ready to ship</span>
        </div>
      </div>

      <div class="item-price">
        {{ item.price | currency: 'EUR' }}
      </div>

      <div class="wishlist-actions">
        <button 
          mat-flat-button 
          class="checkout-btn wishlist-add-btn" 
          (click)="aggiungiAlCarrello(item)">
          ADD TO CART
        </button>
        
        <button mat-icon-button color="warn" class="remove-btn" (click)="rimuovi(item.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="wishlistService.items().length === 0" class="empty-cart">
    <img 
      src="https://cdn-icons-png.flaticon.com/512/10238/10238421.png" 
      alt="Empty Wishlist" 
      class="empty-cart-img"
    />
    <h3>Your wishlist is empty!</h3>
    <p>Find something you love and save it here.</p>
    
    <button mat-flat-button class="go-shop-btn" routerLink="/home">
      Go Shopping
    </button>
  </div>
</div>

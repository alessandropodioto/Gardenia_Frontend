<div class="product-wrap">

  <!-- ════════════════════════════════
       COLONNA SINISTRA — GALLERIA
       ════════════════════════════════ -->
  <div class="gallery-col">

    <!-- Miniature verticali -->
    <div class="thumbs-rail">
      <button
        *ngFor="let img of images; let i = index"
        class="thumb"
        [class.is-active]="i === activeImageIndex()"
        (click)="selectImage(i)"
        [attr.aria-label]="img.alt"
      >
        <img [src]="img.url" [alt]="img.alt" loading="lazy" />
      </button>
    </div>

    <!-- Immagine principale -->
    <div class="main-img-box">


      <img
        class="main-img"
        [src]="images[activeImageIndex()].url"
        [alt]="images[activeImageIndex()].alt"
      />

      <!-- Dot navigation (mobile) -->
      <div class="dots">
        <button
          *ngFor="let img of images; let i = index"
          class="dot"
          [class.is-active]="i === activeImageIndex()"
          (click)="selectImage(i)"
        ></button>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════════
       COLONNA DESTRA — DETTAGLI
       ════════════════════════════════ -->
  <div class="info-col">

    <!-- Titolo -->
    <h1 class="product-title">Ficus elastica "Belize"</h1>

    <!-- Prezzo -->
    <div class="price-block">
      <ng-container *ngIf="originalPrice()">
        <span class="price-original">€ {{ originalPrice()! | number:'1.2-2' }}</span>
      </ng-container>
      <!-- <span class="price-current" [class.is-sale]="!!originalPrice()">
        € {{ currentPrice() | number:'1.2-2' }}
      </span> -->
      <span class="vat-note">IVA inclusa</span>
    </div>

    <hr class="divider" />

    <!-- Descrizione breve -->
    <p class="short-desc">
      Il <strong>Ficus elastica "Belize"</strong> è una varietà variegata dal fogliame spettacolare:
      ogni foglia è un'opera d'arte con sfumature di verde, crema e rosa.
      Perfetto per ambienti luminosi, è robusto e di facile cura.
    </p>

    <hr class="divider" />

    <!-- Selettore variante -->
    <!-- <div class="variant-section">
      <p class="variant-label">
        Dimensione:
        <strong>{{ selectedVariant().label }} — {{ selectedVariant().description }}</strong>
      </p>

      <div class="variant-options">
        <button
          *ngFor="let v of variants"
          class="variant-btn"
          [class.is-selected]="v.id === selectedVariant().id"
          [class.is-unavailable]="!v.available"
          [disabled]="!v.available"
          (click)="selectVariant(v)"
        >
          <span class="vb-label">{{ v.label }}</span>
          <span class="vb-sub">{{ v.description }}</span>
          <span class="vb-price">€ {{ v.price | number:'1.2-2' }}</span>
          <span class="vb-esaurito" *ngIf="!v.available">Esaurito</span>
        </button>
      </div>
    </div>

    <hr class="divider" /> -->

    <!-- Quantità + Aggiungi al carrello -->
    <div class="buy-row">

      <div class="qty-box">
        <button class="qty-btn" (click)="decreaseQty()" [disabled]="quantity() <= 1">−</button>
        <input
          class="qty-input"
          type="number"
          min="1"
          [value]="quantity()"
          (change)="setQty($event)"
        />
        <button class="qty-btn" (click)="increaseQty()">+</button>
      </div>

      <button
        class="cart-btn"
        (click)="addToCart()"
        [class.is-added]="addedToCart()"
        [disabled]="!selectedVariant().available"
      >
        <svg *ngIf="!addedToCart()" class="cart-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39A2 2 0 0 0 9.64 16h9.72a2 2 0 0 0 1.97-1.67L23 6H6"/>
        </svg>
        <svg *ngIf="addedToCart()" class="cart-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span>{{ addedToCart() ? 'Aggiunto al carrello!' : 'Aggiungi al carrello' }}</span>
      </button>

    </div>


  </div><!-- /info-col -->

</div><!-- /product-wrap -->

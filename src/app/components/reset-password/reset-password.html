<!--
  RESET PASSWORD — pagina raggiunta dal link nell'email di recupero.
  L'URL contiene il token e lo username come parametri (es. ?token=abc&user=mario).
  reset-password.ts li legge da ActivatedRoute.snapshot.queryParams al caricamento.

  [(ngModel)]: two-way binding su campi semplici (non un Reactive Form).
  Aggiorna newPassword e confirmPassword mentre l'utente digita.

  *ngIf: mostra il messaggio "Passwords do not match" solo se l'utente ha
  già scritto qualcosa in confirmPassword E le due password sono diverse.

  [disabled]: il bottone "Save" è bloccato finché:
    - newPassword è vuoto, oppure
    - le due password non coincidono.
  Questo evita di inviare dati non validi al backend.

  msg(): signal con il messaggio di feedback dopo il salvataggio
  (es. "Password changed!" o un messaggio di errore).
-->
<div style="text-align: center; margin-top: 50px;">
  <h2>Choose a New Password</h2>
  <!-- userName letto dall'URL in reset-password.ts -->
  <p>Enter your new password for user: <strong>{{userName}}</strong></p>

  <!-- [(ngModel)]: aggiorna newPassword ad ogni tasto -->
  <input type="password" [(ngModel)]="newPassword" placeholder="New Password"
    style="padding: 10px; width: 250px; margin-bottom: 10px;">
  <br>

  <!-- [(ngModel)]: aggiorna confirmPassword ad ogni tasto -->
  <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm New Password"
    style="padding: 10px; width: 250px; margin-bottom: 15px;">
  <br>

  <!-- Errore visibile solo se l'utente ha digitato qualcosa E le password non coincidono -->
  <p *ngIf="confirmPassword && newPassword !== confirmPassword"
    style="color: red; font-size: 12px; margin-bottom: 10px;">
    Passwords do not match.
  </p>

  <!--
    [disabled]: bloccato se newPassword è vuoto o le due password non coincidono.
    cambiaPassword(): invia la nuova password al backend con il token dall'URL.
  -->
  <button (click)="cambiaPassword()"
    [disabled]="!newPassword || newPassword !== confirmPassword"
    style="padding: 10px 20px; cursor: pointer;">
    Save Password
  </button>

  <!-- msg(): signal con il feedback del backend dopo il salvataggio -->
  <p style="color:rgb(55, 0, 255); font-weight: bold; margin-top: 20px;">{{msg()}}</p>
</div>

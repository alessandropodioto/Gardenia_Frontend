<div style="text-align: center; margin-top: 50px;">
  <h2>Choose a New Password</h2>
  <p>Enter your new password for user: <strong>{{userName}}</strong></p>
  
  <input type="password" [(ngModel)]="newPassword" placeholder="New Password" 
         style="padding: 10px; width: 250px; margin-bottom: 10px;">
  <br>

  <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm New Password" 
         style="padding: 10px; width: 250px; margin-bottom: 15px;">
  <br>

  <p *ngIf="confirmPassword && newPassword !== confirmPassword" style="color: red; font-size: 12px; margin-bottom: 10px;">
    Passwords do not match.
  </p>

  <button (click)="cambiaPassword()" 
          [disabled]="!newPassword || newPassword !== confirmPassword"
          style="padding: 10px 20px; cursor: pointer;">
    Save Password
  </button>
  
  <p style="color:rgb(55, 0, 255); font-weight: bold; margin-top: 20px;">{{msg()}}</p>
</div>

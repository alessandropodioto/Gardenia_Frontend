<div class="home-container">


  <!-- Products Section -->
  <section class="products-section">
    <div class="products-container">
      @if (loading()) {
        <div class="loading-message">
          <p>Loading products...</p>
        </div>
      } @else if (error()) {
        <div class="error-message">
          <p>{{ error() }}</p>
        </div>
      } @else if (products().length === 0) {
        <div class="empty-message">
          <p>No products found</p>
        </div>
      } @else {
        <div class="products-grid">
          @for (product of products(); track product.id) {
            <div class="product-card">
              <div class="product-image" (click)="navigateToProductDetails(product.id)">
                <img
                  src="https://images.unsplash.com/photo-1485955900006-10f4d324d411?auto=format&fit=crop&w=400&q=80"
                  alt="{{ product.name }}"
                  class="card-image"
                />
              </div>
              <div class="product-info">
                <h3 class="product-name" (click)="navigateToProductDetails(product.id)">{{ product.name }}</h3>
                <p class="product-price">€{{ product.price.toFixed(2) }}</p>
                <p class="product-stock" [class.low-stock]="product.stock < 5">
                  Stock: {{ product.stock }}
                </p>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </section>
</div>

<header class="main-header">
  <div class="top-banner">
  <div class="container">
    <div class="carousel-wrapper">
      @for (phrase of phrases; track $index) {
        @if ($index === currentIndex) {
          <p class="fade-text">
            {{ phrase }}
          </p>
        }
      }
    </div>
  </div>
</div>

  <div class="navbar-main">
    <div class="container navbar-content">
      <div class="logo">
        <a routerLink="/">
          <img src="img/image3.png" alt="Gardenia Logo" class="logo-img logo-small" />
        </a>
      </div>

      <nav class="nav-menu">
        <ul>
          <li><a routerLink="/category/plants" routerLinkActive="active">Plants</a></li>
          <li><a routerLink="/category/trees" routerLinkActive="active">Trees</a></li>
          <li><a routerLink="/category/tools" routerLinkActive="active">Tools</a></li>
          <li><a routerLink="/category/furniture" routerLinkActive="active">Furniture</a></li>
          <li><a routerLink="/about-us" routerLinkActive="active">About Us</a></li>
        </ul>
      </nav>

      <div class="user-actions">
        <a routerLink="/cart" class="action-link cart-link enhanced-link">
          <mat-icon>shopping_cart</mat-icon>
          <span>Cart</span>
          <span class="cart-count">0</span>
        </a>
        <a *ngIf="isAdmin" routerLink="/admin" class="action-link enhanced-link">
          <mat-icon>admin_panel_settings</mat-icon>
          <span>Admin</span>
        </a>
        <ng-container *ngIf="isLoggedIn; else loginLink">
          <button (click)="logout()" class="action-link enhanced-link">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </ng-container>

        <ng-template #loginLink>
          <a routerLink="/login" class="action-link enhanced-link">
            <mat-icon>person</mat-icon>
            <span>Login</span>
          </a>
        </ng-template>
      </div>
    </div>
  </div>
</header>

<div class="cart-header">
  <h2>Your Cart</h2>
  <button mat-icon-button (click)="chiudi.emit()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div class="shipping-bar">
  <p>Add <strong>15.00 €</strong> for free shipping!</p>
  <mat-progress-bar mode="determinate" value="70"></mat-progress-bar>
</div>

<div class="cart-items">
  <div class="cart-item">
    <img src="https://via.placeholder.com/80" alt="Plant">
    <div class="item-details">
      <h4>Monstera Deliciosa</h4>
      <p>Pot: 12cm</p>
      <div class="quantity-controls">
        <button mat-icon-button><mat-icon>remove</mat-icon></button>
        <span>1</span>
        <button mat-icon-button><mat-icon>add</mat-icon></button>
      </div>
    </div>
    <div class="item-price">25.00 €</div>
  </div>
</div>

<div class="cart-footer">
  <div class="subtotal">
    <span>Subtotal:</span>
    <span>25.00 €</span>
  </div>
  <button mat-flat-button color="primary" class="checkout-btn">Proceed to Checkout</button>
</div>

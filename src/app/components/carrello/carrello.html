<div class="cart-page-container">
  
  <div class="cart-header">
    <h2>Your Cart</h2>
  </div>

  <div class="cart-items">
    <div class="cart-item" *ngFor="let item of items; trackBy: trackById">
      
      <a [routerLink]="['/product', item.idProduct]">
        <img [src]="item.immagine" [alt]="item.nome" class="product-img">
      </a>
      
      <div class="item-details">
        <a [routerLink]="['/product', item.idProduct]" style="text-decoration: none; color: inherit;">
          <h4>{{ item.nome }}</h4>
        </a>
        
        <div class="quantity-controls">
          <button mat-icon-button (click)="cambiaQuantita(item, -1)">
            <mat-icon>{{ item.amount > 1 ? 'remove' : 'delete_outline' }}</mat-icon>
          </button>
          
          <span>{{ item.amount }}</span>
          
          <button mat-icon-button (click)="cambiaQuantita(item, 1)">
            <mat-icon>add</mat-icon>
          </button>
        </div>
      </div>
      
      <div class="item-price">
        {{ item.price | currency:'EUR' }}
      </div>
    </div>
  </div>

  <div class="cart-footer" *ngIf="items.length > 0">
    <button mat-flat-button class="checkout-btn" routerLink="/pagamento">
      Proceed to Checkout
    </button>
  </div>

  <div *ngIf="items.length === 0" style="text-align: center; margin-top: 50px;">
    <p>Your cart is empty.</p>
    <button mat-stroked-button routerLink="/home">Go back to shop</button>
  </div>

</div>

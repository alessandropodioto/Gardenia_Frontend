  в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в”Ӯ
  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ

  <app-sidebar>:

  <router-outlet>:
  Questo ГЁ un router-outlet FIGLIO (nested), diverso da quello in app.html.
  Angular ha una gerarchia di outlet: quello radice in app.html gestisce /user,
  questo figlio gestisce le sotto-route di /user (overview, orders, ecc.).
  Quando si naviga a /user/overview, Angular:
  1. Renderizza User in quello radice di app.html
  2. Renderizza Overview in questo outlet figlio di user.html

<div class="user-dashboard-container">
  <div class="dashboard-grid">

    <!--
      SIDEBAR: navigazione dell'area utente (overview, wishlist, address, orders, logout)
      Il componente ГЁ standalone e si gestisce i propri import (RouterModule incluso).
    -->
    <app-sidebar></app-sidebar>

    <!--
      CONTENUTO PRINCIPALE: router-outlet figlio
      <main>: elemento HTML semantico per il contenuto principale della pagina.
      Ogni navigazione a /user/* inserisce il componente corrispondente qui dentro.
    -->
    <main class="content-box">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
